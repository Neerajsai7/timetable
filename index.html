<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>365-Day Elite Pipeline | Mastery Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --text-muted: #94a3b8; --accent: #3b82f6; --success: #10b981;
            --warning: #f59e0b; --danger: #ef4444; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 2.5rem; color: var(--accent); }

        .gamification-stats { display: flex; justify-content: space-between; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .stat-box { flex: 1; background-color: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); text-align: center; min-width: 200px; }
        .stat-box h3 { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-box .value { font-size: 2.5rem; font-weight: bold; margin: 0.5rem 0; }
        .xp-value { color: var(--warning); } .streak-value { color: #f97316; } .level-value { color: var(--accent); }

        .dashboard { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; margin-bottom: 3rem; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--border); }
        .card h2 { margin-bottom: 1rem; color: var(--text-muted); font-size: 1.1rem; text-transform: uppercase; }

        .progress-container { width: 100%; background-color: var(--bg-color); border-radius: 10px; overflow: hidden; height: 25px; margin-top: 1rem; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: width 0.5s ease; }
        .graph-container { position: relative; height: 300px; width: 100%; }

        .days-container { display: flex; flex-direction: column; gap: 1rem; }
        .day-card { background-color: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .day-header { padding: 1rem 1.5rem; background-color: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .day-badge { background-color: var(--accent); color: white; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; }
        
        .day-card.overdue { border-color: var(--danger); }
        .day-card.today { border-color: var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .day-card.locked { opacity: 0.5; filter: grayscale(100%); pointer-events: none; border-style: dashed; }

        .subtopics-list { padding: 0 1.5rem; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
        .day-card.active .subtopics-list { padding: 1rem 1.5rem; max-height: 800px; border-top: 1px solid var(--border); }

        .subtopic-item { display: flex; align-items: center; width: 100%; margin-bottom: 0.8rem; gap: 1rem; }
        input[type="checkbox"] { appearance: none; width: 20px; height: 20px; border: 2px solid var(--text-muted); border-radius: 4px; cursor: pointer; position: relative; flex-shrink: 0;}
        input[type="checkbox"]:checked { background-color: var(--success); border-color: var(--success); }
        input[type="checkbox"]:checked::after { content: '✔'; position: absolute; color: white; font-size: 14px; top: -1px; left: 3px; }
        
        .task-label { flex-grow: 1; font-size: 0.95rem; }
        .completed-text { color: var(--text-muted); text-decoration: line-through; }
        
        .inline-link { background: rgba(59, 130, 246, 0.1); color: var(--accent); text-decoration: none; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; border: 1px solid var(--accent); transition: all 0.2s; white-space: nowrap; }
        .inline-link:hover { background: var(--accent); color: white; }
        
        .xp-tag { font-size: 0.8rem; background: rgba(245, 158, 11, 0.1); color: var(--warning); padding: 4px 8px; border-radius: 6px; white-space: nowrap; }
        .penalty-tag { color: var(--danger); font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>The 365-Day Elite Pipeline</h1>
            <p id="date-display">System Initializing...</p>
        </header>

        <div class="gamification-stats">
            <div class="stat-box"><h3>Level</h3><div class="value level-value" id="level-display">1</div><p id="level-title" style="color: var(--text-muted); font-size: 0.9rem;">Novice</p></div>
            <div class="stat-box"><h3>Total XP</h3><div class="value xp-value" id="xp-display">0</div><p style="color: var(--text-muted); font-size: 0.9rem;">Points Earned</p></div>
            <div class="stat-box"><h3>Streak</h3><div class="value streak-value" id="streak-display">0 🔥</div><p style="color: var(--text-muted); font-size: 0.9rem;">Consecutive Days</p></div>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2>Total Completion</h2>
                <h1 id="percentage-display" style="font-size: 3rem; color: var(--success);">0%</h1>
                <p id="tasks-completed-display" style="color: var(--text-muted);">0 / 0 Tasks Completed</p>
                <div class="progress-container"><div class="progress-bar" id="main-progress-bar"></div></div>
            </div>
            <div class="card">
                <h2>Trajectory</h2>
                <div class="graph-container"><canvas id="progressChart"></canvas></div>
            </div>
        </div>

        <div class="card" style="background: transparent; border: none; padding: 0;">
            <h2 style="color: var(--text-main); margin-bottom: 1.5rem;">Curriculum Action Center</h2>
            <div class="days-container" id="days-container">
                </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
