<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery Tracker | Long-Term Progress</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; }

        .container { max-width: 1200px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 3rem; }
        header h1 { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
        header p { color: var(--text-muted); }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card { background-color: var(--card-bg); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h2 { margin-bottom: 1rem; font-size: 1.2rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Progress Bar */
        .progress-container { width: 100%; background-color: var(--bg-color); border-radius: 10px; overflow: hidden; height: 25px; margin-top: 1rem; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: width 0.5s ease; }
        .stats-text { display: flex; justify-content: space-between; margin-top: 0.5rem; font-weight: bold; }

        /* Graph Container */
        .graph-container { position: relative; height: 300px; width: 100%; }

        /* Days List */
        .days-container { display: flex; flex-direction: column; gap: 1rem; }
        
        .day-card { background-color: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; transition: transform 0.2s; }
        .day-card:hover { border-color: var(--accent); }
        
        .day-header { padding: 1rem 1.5rem; background-color: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .day-header h3 { display: flex; gap: 1rem; align-items: center; }
        .day-badge { background-color: var(--accent); color: white; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; }
        .phase-badge { color: var(--text-muted); font-size: 0.85rem; font-weight: normal; }
        
        .subtopics-list { padding: 0 1.5rem; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
        .day-card.active .subtopics-list { padding: 1rem 1.5rem; max-height: 500px; border-top: 1px solid var(--border); }

        .subtopic-item { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.8rem; }
        .subtopic-item:last-child { margin-bottom: 0; }
        
        /* Custom Checkbox */
        input[type="checkbox"] {
            appearance: none; width: 20px; height: 20px; border: 2px solid var(--text-muted); border-radius: 4px; cursor: pointer; position: relative; transition: all 0.2s;
        }
        input[type="checkbox"]:checked { background-color: var(--success); border-color: var(--success); }
        input[type="checkbox"]:checked::after {
            content: '✔'; position: absolute; color: white; font-size: 14px; top: -1px; left: 3px;
        }
        .completed-text { color: var(--text-muted); text-decoration: line-through; }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>The Incredible Path</h1>
            <p>Day-by-Day Progression & Mastery Tracker</p>
        </header>

        <div class="dashboard">
            <div class="card">
                <h2>Total Progress</h2>
                <h1 id="percentage-display" style="font-size: 3rem; color: var(--success);">0%</h1>
                <p id="tasks-completed-display">0 / 0 Tasks Completed</p>
                <div class="progress-container">
                    <div class="progress-bar" id="main-progress-bar"></div>
                </div>
            </div>

            <div class="card">
                <h2>Completion Trajectory</h2>
                <div class="graph-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card" style="background: transparent; border: none; padding: 0; box-shadow: none;">
            <h2 style="color: var(--text-main); margin-bottom: 1.5rem;">Curriculum Timeline</h2>
            <div class="days-container" id="days-container">
                </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
